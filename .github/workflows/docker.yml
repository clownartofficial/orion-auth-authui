# Builds and pushes the Docker image to GitHub Container Registry (ghcr.io).
# GitHub equivalent of .forgejo/workflows/release.yml. Tag names follow the
# SemVer policy in VERSIONING.md (vX.Y.Z / vX.Y.Z-rc.N).

name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:        # manual trigger from the Actions UI
    inputs:
      tag:
        description: 'Tag to use for the image'
        required: false
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name || inputs.tag || 'latest' }}
            ghcr.io/${{ github.repository }}:latest
