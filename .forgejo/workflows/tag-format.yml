# Reject tag pushes that do not follow the SemVer policy documented in
# VERSIONING.md. The legacy '-hf*' / '-pre*' suffixes were remapped in
# v0.12.0 and must never come back.

name: Tag Format

on:
  push:
    tags: ['**']

jobs:
  tag-format:
    runs-on: docker
    container:
      image: alpine:3.20
    steps:
      - name: Reject malformed tags
        run: |
          tag="${{ github.ref_name }}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "Tag '$tag' violates the SemVer policy."
            echo "Expected vX.Y.Z or vX.Y.Z-rc.N. See VERSIONING.md."
            exit 1
          fi
          echo "Tag '$tag' is well-formed."
