# Triggered by Forgejo releases. Tag names follow the SemVer policy
# documented in VERSIONING.md: vX.Y.Z for stable, vX.Y.Z-rc.N for an
# explicit release-candidate cut. The tag-format workflow rejects
# anything else before it can produce a release.

name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag à utiliser pour l image'
        required: false
        default: 'latest'

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: git.nhsoul.fr
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            git.nhsoul.fr/nhpro/orion-auth-authui:${{ github.event.release.tag_name || inputs.tag || 'latest' }}
            git.nhsoul.fr/nhpro/orion-auth-authui:latest
